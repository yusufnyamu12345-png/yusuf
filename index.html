<!DOCTYPE html>
<html>
<head>
    <title>Rock Paper Scissors</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.11.0/brython.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brython@3.11.0/brython_stdlib.js"></script>
</head>

<body onload="brython()">

<h1>Rock Paper Scissors</h1>

<button id="rock">Rock</button>
<button id="paper">Paper</button>
<button id="scissors">Scissors</button>

<h2 id="result"></h2>

<script type="text/python">
from browser import document
import random

choices = ["rock", "paper", "scissors"]

def play(user_choice):
    computer_choice = random.choice(choices)

    if user_choice == computer_choice:
        result = "It's a tie!"
    elif (user_choice == "rock" and computer_choice == "scissors") or \
         (user_choice == "paper" and computer_choice == "rock") or \
         (user_choice == "scissors" and computer_choice == "paper"):
        result = "You win!"
    else:
        result = "You lose!"

    document["result"].text = f"You chose {user_choice}, computer chose {computer_choice}. {result}"

def on_rock(event):
    play("rock")

def on_paper(event):
    play("paper")

def on_scissors(event):
    play("scissors")

document["rock"].bind("click", on_rock)
document["paper"].bind("click", on_paper)
document["scissors"].bind("click", on_scissors)
</script>

</body>
</html>
